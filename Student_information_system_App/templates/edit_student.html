{% extends "base.html" %}

{% block title %}Edit Student - Student Information System{% endblock %}

{% block content %}
<section class="register-page">
    <h2>Edit Student Information</h2>

    <div class="form-container">
        <form method="POST" class="registration-form">

            <div class="form-group">
                <label for="student_name">Student Name *</label>
                <input
                    type="text"
                    id="student_name"
                    name="student_name"
                    value="{{ student.student_name }}"
                    required>
            </div>

            <div class="form-group">
                <label for="registration_number">Registration Number *</label>
                <input
                    type="text"
                    id="registration_number"
                    name="registration_number"
                    value="{{ student.registration_number }}"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ student.email }}"
                    required>
            </div>

            <div class="form-group">
                <label for="programme">Programme *</label>

                <select name="programme" id="programme" required>

                    <option value="Computer Science"
                    {% if student.programme=="Computer Science" %}selected{% endif %}>
                    Computer Science
                    </option>

                    <option value="Information Technology"
                    {% if student.programme=="Information Technology" %}selected{% endif %}>
                    Information Technology
                    </option>

                    <option value="Software Engineering"
                    {% if student.programme=="Software Engineering" %}selected{% endif %}>
                    Software Engineering
                    </option>

                    <option value="Data Science"
                    {% if student.programme=="Data Science" %}selected{% endif %}>
                    Data Science
                    </option>

                    <option value="Artificial Intelligence"
                    {% if student.programme=="Artificial Intelligence" %}selected{% endif %}>
                    Artificial Intelligence
                    </option>

                </select>

            </div>

            <div class="form-group">

                <button type="submit" class="btn btn-primary">
                    Update Student
                </button>

                <a href="{{ url_for('students_list') }}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</section>
{% endblock %}
